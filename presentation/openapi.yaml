openapi: 3.1.0
info:
    title: SC6117 Crypto Dashboard API
    description: API endpoints for the SC6117 Crypto Dashboard application with real-time cryptocurrency data, predictions, news, and chatbot functionality.
    version: 1.0.0

# servers:
#   - url: http://localhost:6432
#     description: Development server
#   - url: https://sc6117-api.chencraft.com
#     description: Production server

tags:
    - name: Health
      description: Health check endpoints
    - name: Chart Data
      description: Cryptocurrency price and prediction data
    - name: News
      description: Cryptocurrency news with sentiment analysis
    - name: Ticker
      description: Real-time cryptocurrency ticker data
    - name: Chatbot
      description: AI chatbot for cryptocurrency queries

paths:
    /health:
        get:
            tags:
                - Health
            summary: Health check
            description: Verify the API server is running
            operationId: healthCheck
            responses:
                '200':
                    description: Server is healthy
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
                                        examples:
                                            - ok
                                    timestamp:
                                        type: string
                                        format: date-time
                                        examples:
                                            - '2025-12-04T12:00:00.000Z'
                            examples:
                                success:
                                    value:
                                        status: ok
                                        timestamp: '2025-12-04T12:00:00.000Z'

    /api/chart-data:
        get:
            tags:
                - Chart Data
            summary: Get cryptocurrency chart data
            description: Returns cryptocurrency price data with real and predicted prices based on query parameters. Always returns 24 data points evenly distributed across the time range.
            operationId: getChartData
            parameters:
                - name: startDateTime
                  in: query
                  required: true
                  description: Start date and time in ISO 8601 format (YYYY-MM-DDTHH:mm)
                  schema:
                      type: string
                      format: date-time
                  examples:
                      default:
                          value: '2025-12-03T00:00'
                - name: endDateTime
                  in: query
                  required: true
                  description: End date and time in ISO 8601 format (YYYY-MM-DDTHH:mm)
                  schema:
                      type: string
                      format: date-time
                  examples:
                      default:
                          value: '2025-12-04T00:00'
                - name: cryptoPair
                  in: query
                  required: true
                  description: Cryptocurrency trading pair
                  schema:
                      type: string
                      enum:
                          - BTC/USD
                          - ETH/USD
                          - XRP/USD
                  examples:
                      btc:
                          value: BTC/USD
            responses:
                '200':
                    description: Successful response with chart data
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/ChartDataPoint'
                            examples:
                                sample:
                                    value:
                                        - time: '00:00'
                                          realPrice: 45000
                                          predictionPrice: 45523
                                        - time: '01:02'
                                          realPrice: 46245
                                          predictionPrice: 45812
                                        - time: '02:05'
                                          realPrice: 45678
                                          predictionPrice: 46234

    /api/news:
        get:
            tags:
                - News
            summary: Get cryptocurrency news
            description: Returns a list of cryptocurrency news articles with sentiment analysis, sorted chronologically with newest first.
            operationId: getNews
            parameters:
                - name: limit
                  in: query
                  required: true
                  description: Maximum number of news items to return
                  schema:
                      type: integer
                      minimum: 1
                      maximum: 100
                  examples:
                      default:
                          value: 10
            responses:
                '200':
                    description: Successful response with news items
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/NewsItem'
                            examples:
                                sample:
                                    value:
                                        - id: news-1-1234567890
                                          title: Bitcoin Reaches New All-Time High
                                          abstract: Lorem ipsum dolor sit amet, consectetur adipiscing elit...
                                          timestamp: '2025-12-04T10:30:00.000Z'
                                          sentiment: positive
                                        - id: news-2-1234567891
                                          title: Regulatory Clarity Expected in Q1 2025
                                          abstract: Duis aute irure dolor in reprehenderit...
                                          timestamp: '2025-12-04T09:15:00.000Z'
                                          sentiment: neutral

    /api/ticker:
        get:
            tags:
                - Ticker
            summary: Get real-time ticker data
            description: Returns real-time cryptocurrency ticker data for all supported symbols (BTC, ETH, BNB, SOL, XRP, ADA, DOGE).
            operationId: getTicker
            responses:
                '200':
                    description: Successful response with ticker data
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/TickerItem'
                            examples:
                                sample:
                                    value:
                                        - symbol: BTC
                                          pair: USD
                                          price: 42150.75
                                          change: 2.34
                                          volume24h: 28500000000
                                          high24h: 42800.0
                                          low24h: 41200.0
                                        - symbol: ETH
                                          pair: USD
                                          price: 2245.5
                                          change: -0.82
                                          volume24h: 15200000000
                                          high24h: 2280.0
                                          low24h: 2210.0

    /api/chatbot:
        post:
            tags:
                - Chatbot
            summary: Send message to chatbot
            description: Sends a message to the chatbot and receives a response. Currently returns a mock response.
            operationId: sendChatMessage
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ChatRequest'
                        examples:
                            sample:
                                value:
                                    message: What's the current Bitcoin trend?
                                    history:
                                        - role: assistant
                                          content: Hello! How can I help you?
                                          timestamp: '2025-12-04T10:00:00.000Z'
            responses:
                '200':
                    description: Successful response with chatbot message
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ChatResponse'
                            examples:
                                sample:
                                    value:
                                        message: 'You said: "What''s the current Bitcoin trend?". This is a mock response. The chatbot feature is under development.'
                                        timestamp: '2025-12-04T10:00:05.000Z'
                '400':
                    description: Bad request - missing required fields
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                            examples:
                                missingMessage:
                                    value:
                                        error: Message is required

components:
    schemas:
        ChartDataPoint:
            type: object
            required:
                - time
                - realPrice
                - predictionPrice
            properties:
                time:
                    type: string
                    description: Time/date label - format adapts based on time range (HH:MM for ≤24h, YYYY-MM-DD for >24h)
                    examples:
                        - '10:00'
                realPrice:
                    type: number
                    description: Actual cryptocurrency price in USD (integer)
                    examples:
                        - 45234
                predictionPrice:
                    type: number
                    description: Predicted price by the ML model in USD (integer)
                    examples:
                        - 45612

        NewsItem:
            type: object
            required:
                - id
                - title
                - abstract
                - timestamp
                - sentiment
            properties:
                id:
                    type: string
                    description: Unique identifier for the news item
                    examples:
                        - news-1-1234567890
                title:
                    type: string
                    description: News article headline
                    examples:
                        - Bitcoin Reaches New All-Time High
                abstract:
                    type: string
                    description: Brief summary or excerpt from the article
                    examples:
                        - Lorem ipsum dolor sit amet, consectetur adipiscing elit...
                timestamp:
                    type: string
                    format: date-time
                    description: Publication time in ISO 8601 format
                    examples:
                        - '2025-12-04T10:30:00.000Z'
                sentiment:
                    type: string
                    enum:
                        - positive
                        - negative
                        - neutral
                    description: AI-analyzed sentiment of the article's impact on crypto market
                    examples:
                        - positive

        TickerItem:
            type: object
            required:
                - symbol
                - pair
                - price
                - change
                - volume24h
                - high24h
                - low24h
            properties:
                symbol:
                    type: string
                    description: Cryptocurrency symbol
                    examples:
                        - BTC
                pair:
                    type: string
                    description: Trading pair (always USD)
                    examples:
                        - USD
                price:
                    type: number
                    description: Current price in USD
                    examples:
                        - 42150.75
                change:
                    type: number
                    description: 24-hour percentage change
                    examples:
                        - 2.34
                volume24h:
                    type: number
                    description: 24-hour trading volume in USD
                    examples:
                        - 28500000000
                high24h:
                    type: number
                    description: Highest price in the last 24 hours
                    examples:
                        - 42800.0
                low24h:
                    type: number
                    description: Lowest price in the last 24 hours
                    examples:
                        - 41200.0

        ChatMessage:
            type: object
            required:
                - role
                - content
                - timestamp
            properties:
                role:
                    type: string
                    enum:
                        - user
                        - assistant
                    description: Who sent the message
                    examples:
                        - assistant
                content:
                    type: string
                    description: Message content
                    examples:
                        - Hello! How can I help you?
                timestamp:
                    type: string
                    format: date-time
                    description: Message timestamp in ISO 8601 format
                    examples:
                        - '2025-12-04T10:00:00.000Z'

        ChatRequest:
            type: object
            required:
                - message
            properties:
                message:
                    type: string
                    description: User's message to the chatbot
                    examples:
                        - What's the current Bitcoin trend?
                history:
                    type: array
                    items:
                        $ref: '#/components/schemas/ChatMessage'
                    description: Previous conversation history for context

        ChatResponse:
            type: object
            required:
                - message
                - timestamp
            properties:
                message:
                    type: string
                    description: Chatbot's response message
                    examples:
                        - 'You said: "What''s the current Bitcoin trend?". This is a mock response.'
                timestamp:
                    type: string
                    format: date-time
                    description: Response timestamp in ISO 8601 format
                    examples:
                        - '2025-12-04T10:00:05.000Z'

        Error:
            type: object
            required:
                - error
            properties:
                error:
                    type: string
                    description: Error message description
                    examples:
                        - Message is required
